# =============================================================
# StudyFlow - Configuration commune
# Profil actif via SPRING_PROFILES_ACTIVE (dev, prod)
# =============================================================
spring:
  application:
    name: studyflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false
    time-zone: UTC
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  messages:
    encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ---- OAuth2 Google ----
  # Necessite GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET dans .env
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # ---- Mail SMTP (optionnel — si vide, EmailService logge le contenu) ----
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: always
    include-binding-errors: always

# Configuration applicative custom
app:
  jwt:
    secret: ${JWT_SECRET:change_me_change_me_change_me_change_me_64_chars_minimum_please}
    access-token-expiration-ms: ${JWT_EXPIRATION:1800000}        # 30 min (par defaut)
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 jours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  password-reset:
    expiration-minutes: 30
  mail:
    from: ${MAIL_FROM:noreply@studyflow.io}

logging:
  level:
    root: INFO
    com.studyflow: DEBUG
    org.springframework.security: INFO
