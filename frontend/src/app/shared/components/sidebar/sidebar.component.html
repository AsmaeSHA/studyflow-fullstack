<aside class="sidebar">

  <!-- Brand -->
  <div class="sidebar__brand">
    <div class="brand-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4L36 13V27L20 36L4 27V13L20 4Z" stroke="url(#sg)" stroke-width="2" fill="none"/>
        <path d="M20 10L30 16V24L20 30L10 24V16L20 10Z" fill="url(#sg)" opacity="0.35"/>
        <circle cx="20" cy="20" r="4" fill="url(#sg)"/>
        <defs>
          <linearGradient id="sg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#4facfe"/><stop offset="1" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="brand-name">StudyFlow</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      <span>Dashboard</span>
    </a>

    <a routerLink="/sessions" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </span>
      <span>Sessions</span>
    </a>

    <a routerLink="/analytics" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
        </svg>
      </span>
      <span>Analytiques</span>
    </a>

    <!-- Groupes -->
    <div class="nav-section">Collaboration</div>

    <a routerLink="/groups" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </span>
      <span>Groupes</span>
    </a>

    <a routerLink="/notifications" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </span>
      <span>Notifications</span>
      <span class="nav-badge">3</span>
    </a>

    <!-- Admin uniquement -->
    <ng-container *ngIf="isAdmin">
      <div class="nav-section">Administration</div>
      <a routerLink="/admin" routerLinkActive="active" class="nav-item nav-item--admin">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/>
          </svg>
        </span>
        <span>Administration</span>
      </a>
    </ng-container>
  </nav>

  <!-- Footer profil -->
  <div class="sidebar__footer">
    <div class="user-card">
      <div class="user-avatar">{{ initials }}</div>
      <div class="user-info">
        <span class="user-name">{{ user?.name || 'Utilisateur' }}</span>
        <span class="user-role">{{ isAdmin ? 'Administrateur' : 'Étudiant' }}</span>
      </div>
      <button class="logout-btn" (click)="logout()" title="Déconnexion">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

</aside>
